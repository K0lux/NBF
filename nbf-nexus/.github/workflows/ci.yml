name: Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nbf-nexus/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: nbf-nexus

      - name: Linting
        run: npm run lint
        working-directory: nbf-nexus

      - name: Type Check
        run: npx tsc --noEmit
        working-directory: nbf-nexus

      - name: Run Tests
        run: npm test
        working-directory: nbf-nexus

      - name: Security Audit
        run: npm audit --audit-level=high
        working-directory: nbf-nexus
        continue-on-error: true # Warning only, fails on critical separately if needed

  docker_build_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image (Dry Run)
        run: |
          docker build -t nbf-nexus-test .
        working-directory: nbf-nexus
        # This ensures Dockerfile stays valid when base images update externally
