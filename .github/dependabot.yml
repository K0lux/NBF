version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/nbf-nexus"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "vitest*"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/nbf-nexus"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "infra(docker):"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
